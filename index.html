<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Vokabeltrainer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1 id="app-title">Vokabeltrainer</h1>
      </header>

      <main>
        <div id="lists-overview">
          <div class="section-header">
            <h2>Listen</h2>
            <button type="button" id="btn-add-list" class="btn-primary">
              + Liste
            </button>
          </div>
          <ul id="lists-list" class="card-stack"></ul>
          <p id="lists-empty" class="hint">
            Noch keine Listen. Lege eine neue an.
          </p>
        </div>

        <div id="list-detail" class="hidden">
          <button type="button" id="btn-back-lists" class="back-btn">
            ← Listen
          </button>
          <div class="section-header">
            <button type="button" id="btn-add-vocab" class="btn-primary">
              + Vokabel
            </button>
          </div>
          <ul id="vocab-list" class="card-stack"></ul>
          <p id="vocabs-empty" class="hint hidden">
            Noch keine Vokabeln in dieser Liste.
          </p>
        </div>

        <div id="learn-area" class="hidden">
          <button type="button" id="btn-back-learn" class="back-btn">
            ← Listen
          </button>
          <p class="progress">
            <span id="card-index">1</span> / <span id="card-total">0</span>
          </p>

          <button
            type="button"
            id="flashcard"
            class="card flashcard"
            aria-label="Karte umdrehen"
          >
            <div class="flashcard-inner">
              <div class="card-face flashcard-front">
                <p id="card-front"></p>
                <span class="label">Vorderseite</span>
              </div>
              <div class="card-face flashcard-back">
                <p id="card-back"></p>
                <span class="label">Rückseite</span>
              </div>
            </div>
          </button>
          <p class="hint">Klicke auf die Karte zum Umdrehen</p>

          <div class="learn-actions">
            <button type="button" id="btn-prev">← Zurück</button>
            <button type="button" id="btn-shuffle">Mischen</button>
            <button type="button" id="btn-next">Weiter →</button>
          </div>
        </div>
      </main>
    </div>

    <dialog id="dialog-add-list">
      <form id="add-list-form" method="dialog">
        <h2>Neue Liste</h2>
        <label>
          Name
          <input
            type="text"
            id="input-list-name"
            required
            placeholder="z.B. Englisch Unit 3"
          />
        </label>
        <div class="dialog-actions">
          <button type="button" id="cancel-list" class="btn-secondary">
            Abbrechen
          </button>
          <button type="submit" class="btn-primary">Erstellen</button>
        </div>
      </form>
    </dialog>

    <dialog id="dialog-vocab">
      <form id="vocab-form" method="dialog">
        <h2 id="vocab-dialog-title">Neue Vokabel</h2>
        <input type="hidden" id="edit-vocab-id" value="" />
        <label>
          Vorderseite
          <input
            type="text"
            id="input-front"
            required
            placeholder="z.B. Haus"
          />
        </label>
        <label>
          Rückseite
          <input
            type="text"
            id="input-back"
            required
            placeholder="z.B. house"
          />
        </label>
        <fieldset class="flip-choice">
          <legend>Anzeige beim Lernen</legend>
          <label class="radio-label">
            <input
              type="radio"
              name="flip-mode"
              value="front"
              id="flip-front"
              checked
            />
            Immer vorne
          </label>
          <label class="radio-label">
            <input type="radio" name="flip-mode" value="both" id="flip-both" />
            Beidseitig
          </label>
        </fieldset>
        <div class="dialog-actions">
          <button type="button" id="cancel-vocab" class="btn-secondary">
            Abbrechen
          </button>
          <button type="submit" class="btn-primary" id="vocab-submit-btn">
            Hinzufügen
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
